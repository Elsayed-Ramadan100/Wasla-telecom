<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim 10GB Gift - Wasla Telecom</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/shared-layout.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <header style="border-bottom: 1px solid var(--border-color); background: var(--bg-card);">
        <div class="container">
            <nav class="flex justify-between items-center" style="height: 60px;">
                <a href="index.html" class="logo"
                    style="font-size: 24px; font-weight: 800; color: var(--primary-color);">
                    WASLA<span style="color: var(--text-main);">TELECOM</span>
                </a>

                <div class="flex items-center header-controls" style="gap: 15px;">
                    <button id="theme-toggle-btn" class="header-btn" title="Toggle Dark Mode">🌙</button>
                    <a href="about.html" class="header-btn" style="font-weight: 500; color: var(--text-main);">About</a>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span style="font-size: 1.2rem;" class="user-icon">👤</span>
                        <span class="user-name-wrapper" style="display:flex; align-items:center;">
                            <span class="user-name user-name-truncate" style="font-weight: 600;">...</span>
                        </span>
                    </div>
                    <a href="#" class="btn btn-secondary header-btn logout-btn" style="padding: 5px 10px;"
                        onclick="WaslaUtils.logoutUser()">Logout</a>
                    <button id="mobile-menu-btn" class="header-btn hamburger-btn" style="display: none;"
                        title="Menu">☰</button>
                </div>
            </nav>
        </div>
    </header>

    <!-- Secondary Navigation Bar -->
    <nav class="secondary-nav"
        style="background: var(--bg-body); padding: 10px 0; border-bottom: 1px solid var(--border-color);">
        <div class="container" style="display: flex; justify-content: center;">
            <div class="top-nav-menu">
                <a href="dashboard.html" data-tooltip="Overview">🏠</a>
                <a href="usage.html" data-tooltip="My Usage">📊</a>
                <a href="offers.html" data-tooltip="Offers & Plans">✨</a>
                <a href="payment.html" data-tooltip="Recharge & Pay">💳</a>
                <a href="rewards.html" data-tooltip="Rewards">🎁</a>
                <a href="profile.html" data-tooltip="Settings">⚙️</a>
                <a href="support.html" data-tooltip="Support">🎧</a>
                <a href="claim-gift.html" id="nav-profile-completion" class="active" data-tooltip="Get 10GB Gift">🎁</a>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 30px;">
        <main>
            <!-- Personalization Form View -->
            <div id="dashboard-personalization-view">
                <h2 style="margin-bottom: 20px;">Profile Details</h2>
                <div class="card">
                    <form id="personalization-form" style="margin-top: 10px;">
                        <h3 style="margin-bottom: 20px;" id="personalization-title">Complete Profile to Claim 10GB
                        </h3>

                        <!-- Usage / Behavioral -->
                        <h4 style="margin-bottom: 15px; font-size: 1rem; color: var(--text-color);">General
                            Information</h4>

                        <div class="form-group">
                            <label class="form-label">Partner? <span class="text-danger">*</span></label>
                            <div class="radio-group" style="display: flex; gap: 15px;">
                                <label><input type="radio" name="partner" value="Yes" required> Yes</label>
                                <label><input type="radio" name="partner" value="No"> No</label>
                                <label><input type="radio" name="partner" value="Prefer not to say"> Prefer not to
                                    say</label>
                            </div>
                        </div>

                        <div class="form-row" style="display: flex; gap: 15px;">
                            <div class="form-group half" style="flex: 1;">
                                <label class="form-label">Dependents? <span class="text-danger">*</span></label>
                                <div class="radio-group" style="display: flex; gap: 15px;">
                                    <label><input type="radio" name="dependents" value="Yes" required> Yes</label>
                                    <label><input type="radio" name="dependents" value="No"> No</label>
                                </div>
                            </div>
                            <div class="form-group half" style="flex: 1;">
                                <label class="form-label">Phone Service? <span class="text-danger">*</span></label>
                                <div class="radio-group" style="display: flex; gap: 15px;">
                                    <label><input type="radio" name="phoneService" value="Yes" required> Yes</label>
                                    <label><input type="radio" name="phoneService" value="No"> No</label>
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Multiple Lines? <span class="text-danger">*</span></label>
                            <div class="radio-group" style="display: flex; gap: 15px;">
                                <label><input type="radio" name="multipleLines" value="Yes" required> Yes</label>
                                <label><input type="radio" name="multipleLines" value="No"> No</label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="internetService">Internet Service <span
                                    class="text-danger">*</span></label>
                            <select id="internetService" class="form-control" required
                                style="width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border-color);">
                                <option value="">Select Option</option>
                                <option value="DSL">DSL</option>
                                <option value="Fiber">Fiber</option>
                                <option value="None">None</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Additional Services</label>
                            <div class="checkbox-group-grid"
                                style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                                <label><input type="checkbox" id="onlineSecurity"> Online Security</label>
                                <label><input type="checkbox" id="onlineBackup"> Online Backup</label>
                                <label><input type="checkbox" id="deviceProtection"> Device Protection</label>
                                <label><input type="checkbox" id="techSupport"> Tech Support</label>
                                <label><input type="checkbox" id="streamingTV"> Streaming TV</label>
                                <label><input type="checkbox" id="streamingMovies"> Streaming Movies</label>
                                <label><input type="checkbox" id="paperlessBilling"> Paperless Billing</label>
                            </div>
                        </div>

                        <div class="form-row" style="display: flex; gap: 15px;">
                            <div class="form-group half" style="flex: 1;">
                                <label class="form-label" for="contractType">Contract Type <span
                                        class="text-danger">*</span></label>
                                <select id="contractType" class="form-control" required
                                    style="width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border-color);">
                                    <option value="">Select Type</option>
                                    <option value="Month-to-Month">Month-to-Month</option>
                                    <option value="One year">One year</option>
                                    <option value="Two year">Two year</option>
                                </select>
                            </div>
                            <div class="form-group half" style="flex: 1;">
                                <label class="form-label" for="paymentMethod">Payment Method <span
                                        class="text-danger">*</span></label>
                                <select id="paymentMethod" class="form-control" required
                                    style="width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border-color);">
                                    <option value="Vodafone Cash" selected>Vodafone Cash</option>
                                    <option value="Credit Card">Credit Card</option>
                                    <option value="Bank Transfer">Bank Transfer</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="monthlyCharges">Monthly Charges (Approx. EGP) <span
                                    class="text-danger">*</span></label>
                            <input type="number" id="monthlyCharges" class="form-control"
                                placeholder="Approx. monthly bill" required
                                style="width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border-color);">
                        </div>

                        <div class="form-row" style="display: flex; gap: 15px;">
                            <div class="form-group half" style="flex: 1;">
                                <label class="form-label" for="preferredPackage">Preferred Package <span
                                        class="text-danger">*</span></label>
                                <input type="text" id="preferredPackage" class="form-control"
                                    placeholder="e.g. Super Mega" required
                                    style="width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border-color);">
                            </div>
                            <div class="form-group half" style="flex: 1;">
                                <label class="form-label" for="avgConsumption">Avg Consumption <span
                                        class="text-danger">*</span></label>
                                <select id="avgConsumption" class="form-control" required
                                    style="width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border-color);">
                                    <option value="">Select</option>
                                    <option value="Low">Low</option>
                                    <option value="Medium">Medium</option>
                                    <option value="High">High</option>
                                </select>
                            </div>
                        </div>

                        <!-- Preferences -->
                        <h4 style="margin: 20px 0 15px; font-size: 1rem; color: var(--text-color);">Preferences</h4>

                        <div class="form-group">
                            <label class="form-label">Notification Preference <span class="text-danger">*</span></label>
                            <div class="checkbox-group-flex" style="display: flex; gap: 15px;">
                                <label><input type="checkbox" name="notificationPrefs" value="SMS"> SMS</label>
                                <label><input type="checkbox" name="notificationPrefs" value="Email"> Email</label>
                                <label><input type="checkbox" name="notificationPrefs" value="Push Notification">
                                    Push</label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="preferredOffers">Preferred Offers (comma separated) <span
                                    class="text-danger">*</span></label>
                            <input type="text" id="preferredOffers" class="form-control"
                                placeholder="e.g. Data, Voice, Bundles" required
                                style="width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border-color);">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="switchReason">Reason for Switching</label>
                            <input type="text" id="switchReason" class="form-control" placeholder="Optional"
                                style="width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border-color);">
                        </div>

                        <div class="form-group"
                            style="margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border-color);">
                            <label class="form-label"
                                style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer;">
                                <input type="checkbox" id="privacyPolicy" required>
                                <span>I agree to the <a href="terms.html">privacy policy</a> and data usage for
                                    personalized offers. <span class="text-danger">*</span></span>
                            </label>
                        </div>

                        <div class="btn-group" style="margin-top: 20px;">
                            <button type="submit" id="btn-submit-personalization" class="btn btn-primary"
                                style="width: 100%;">Submit & Claim 10GB</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/header.js"></script>
    <script src="js/claim-gift.js"></script>
</body>

</html>
