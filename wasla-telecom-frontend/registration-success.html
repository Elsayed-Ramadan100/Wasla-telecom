<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Wasla Telecom</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/shared-layout.css">
    <link rel="stylesheet" href="css/registration-success.css">
</head>

<body>

    <header style="border-bottom: 1px solid var(--border-color); background: var(--bg-card);">
        <div class="container">
            <nav class="flex justify-between items-center" style="height: 60px;">
                <a href="index.html" class="logo"
                    style="font-size: 24px; font-weight: 800; color: var(--primary-color);">
                    WASLA<span style="color: var(--text-main);">TELECOM</span>
                </a>

                <div class="flex items-center header-controls" style="gap: 15px;">
                    <button id="theme-toggle-btn" class="header-btn" title="Toggle Dark Mode">🌙</button>
                    <a href="about.html" class="header-btn" style="font-weight: 500; color: var(--text-main);">About</a>

                    <div style="display: none; align-items: center; gap: 8px;">
                        <span style="font-size: 1.2rem;" class="user-icon">👤</span>
                        <span class="user-name-wrapper" style="display:flex; align-items:center;">
                            <span class="user-name user-name-truncate" style="font-weight: 600;">...</span>
                        </span>
                    </div>
                    <a href="#" class="btn btn-secondary header-btn logout-btn" style="display: none;"
                        onclick="WaslaUtils.logoutUser()">Logout</a>
                    <button id="mobile-menu-btn" class="header-btn hamburger-btn" style="display: none;"
                        title="Menu">☰</button>
                </div>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="card success-card">
            <div class="success-icon">🎉</div>
            <h1>Welcome to Wasla!</h1>
            <p>Your account has been successfully created.</p>

            <div class="gift-box">
                <h3 style="color: var(--primary-color);">🎁 10GB FREE GIFT</h3>
                <p>Your welcome gift has been added to your balance.</p>
                <small>Valid for 30 days.</small>
            </div>

            <p style="margin-bottom: 30px;">You will be redirected to login in <span id="countdown">5</span> seconds...
            </p>

            <a href="login.html" class="btn btn-primary">Go to Login Now</a>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/header.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let seconds = 5;
            const el = document.getElementById('countdown');
            const interval = setInterval(() => {
                seconds--;
                el.textContent = seconds;
                if (seconds <= 0) {
                    clearInterval(interval);
                    window.location.href = 'login.html';
                }
            }, 1000);
        });
    </script>
</body>

</html>
